    <meta http-equiv="Expires" content="0" />
    <!--
      Cache kill-switch: unregister any stale service worker and purge cached
      bundles left by earlier deploys, then reload once so every browser gets
      the current build regardless of its cache history.
    -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var had = regs && regs.length > 0;
              (regs || []).forEach(function (r) { r.unregister(); });
              var done = function () {
                if (had && !sessionStorage.getItem("kichana_cache_cleared")) {
                  sessionStorage.setItem("kichana_cache_cleared", "1");
                  location.reload();
                }
              };
              if (window.caches && caches.keys) {
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }).then(done).catch(done);
              } else {
                done();
              }
            }).catch(function () {});
          }
        } catch (e) {}
      })();
    </script>
